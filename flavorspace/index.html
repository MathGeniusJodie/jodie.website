<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flavourspace</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3248;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --text: #e8eaf2;
    --muted: #8b8fa8;
    --radius: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 17px;
    font-weight: 700;
    color: var(--accent2);
    flex-shrink: 0;
    letter-spacing: -0.3px;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 500px;
  }
  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 8px 14px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  /* ── Dropdown ── */
  #dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 5px);
    left: 0; right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    max-height: 320px;
    overflow-y: auto;
    z-index: 100;
    box-shadow: 0 10px 40px #0009;
  }
  #dropdown.open { display: block; }
  .dd-item {
    padding: 8px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }
  .dd-item:hover, .dd-item.active { background: var(--surface2); }
  .dd-name { flex: 1; }
  .dd-chips { display: flex; gap: 3px; flex-shrink: 0; }

  /* ── Filter bar ── */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    flex-shrink: 0;
    background: var(--bg);
  }
  .filter-bar-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--muted);
    margin-right: 4px;
    flex-shrink: 0;
  }
  .cb-label {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    user-select: none;
    transition: background 0.1s, border-color 0.1s;
  }
  .cb-label:hover { background: var(--surface2); }
  .cb-label input[type="checkbox"] { display: none; }
  .cb-label.checked {
    background: #1e1a3a;
    border-color: var(--accent);
    color: var(--accent2);
  }

  /* ── Main layout ── */
  .main {
    display: grid;
    grid-template-columns: 280px 1fr;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .ing-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }
  .ing-name {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 10px;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.2px;
  }
  .chip-vegan   { background: #064e3b; color: #34d399; }
  .chip-animal  { background: #431407; color: #fb923c; }
  .chip-meat    { background: #450a0a; color: #f87171; }
  .chip-legume  { background: #1a2e05; color: #a3e635; }
  .chip-alcohol { background: #2e1065; color: #c084fc; }

  .stats {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.8;
    padding: 4px 0;
  }

  /* ── Results panel ── */
  .results-panel {
    overflow-y: auto;
    padding: 14px;
  }
  .results-heading {
    font-size: 13px;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .results-heading strong { color: var(--text); }

  .match-list { display: flex; flex-direction: column; gap: 4px; }

  .match-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    display: grid;
    grid-template-columns: 48px 1fr auto;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
  }
  .match-row:hover { background: var(--surface2); border-color: var(--accent); }
  .score-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .score-num {
    font-size: 13px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .score-track {
    width: 34px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .score-bar { height: 100%; border-radius: 2px; }

  .match-body { min-width: 0; }
  .match-name {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .match-chips { display: flex; gap: 3px; flex-shrink: 0; }

  .show-more-btn {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.1s;
  }
  .show-more-btn:hover { background: var(--surface); color: var(--text); }

  .empty-msg {
    color: var(--muted);
    text-align: center;
    padding: 60px 20px;
    font-size: 14px;
    line-height: 1.8;
  }
  .empty-icon { font-size: 36px; display: block; margin-bottom: 10px; }

  .setup-warn {
    background: #1a1200;
    border: 1px solid #5a3e00;
    border-radius: var(--radius);
    padding: 16px;
    font-size: 13px;
    color: #fbbf24;
    line-height: 1.8;
  }
  .setup-warn code {
    background: #0f0a00;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: monospace;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 760px) {
    body {
      min-height: 100svh;
    }

    header {
      align-items: stretch;
      gap: 10px;
      padding: 12px;
      flex-wrap: wrap;
    }

    header h1 {
      width: 100%;
      font-size: 16px;
    }

    .search-wrap {
      max-width: none;
      width: 100%;
    }

    #search {
      font-size: 16px;
      padding: 10px 12px;
    }

    #dropdown {
      max-height: min(55svh, 360px);
    }

    .filter-bar {
      flex-wrap: nowrap;
      gap: 8px;
      overflow-x: auto;
      padding: 8px 12px;
      scrollbar-width: none;
    }

    .filter-bar::-webkit-scrollbar {
      display: none;
    }

    .filter-bar-label,
    .cb-label {
      flex: 0 0 auto;
    }

    .main {
      display: block;
      overflow-y: auto;
    }

    .sidebar {
      border-right: 0;
      border-bottom: 1px solid var(--border);
      overflow: visible;
      padding: 12px;
    }

    .ing-card {
      padding: 12px;
    }

    .ing-name {
      margin-bottom: 8px;
    }

    .stats {
      padding: 0;
      line-height: 1.6;
    }

    .results-panel {
      overflow: visible;
      padding: 12px;
    }

    .match-row {
      grid-template-columns: 44px minmax(0, 1fr);
      gap: 9px;
      padding: 10px;
    }

    .match-chips {
      display: none;
    }

    .score-track {
      width: 30px;
    }

    .match-name {
      white-space: normal;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .empty-msg {
      padding: 36px 16px;
    }
  }

  @media (max-width: 420px) {
    .dd-item {
      align-items: flex-start;
    }

    .dd-chips {
      display: none;
    }

    .cb-label {
      padding: 6px 9px;
      font-size: 12px;
    }

    .results-heading {
      line-height: 1.4;
    }
  }
</style>
</head>
<body>

<header>
  <h1>Flavourspace</h1>
  <div class="search-wrap">
    <input id="search" type="search" placeholder="Search ingredients…" autocomplete="off" spellcheck="false">
    <div id="dropdown"></div>
  </div>
</header>

<div class="filter-bar" id="filter-bar">
  <span class="filter-bar-label">Hide:</span>
  <label class="cb-label" id="fl-meat">
    <input type="checkbox" id="cb-meat"> 🥩 Meat
  </label>
  <label class="cb-label" id="fl-animal">
    <input type="checkbox" id="cb-animal"> 🐾 Animal products
  </label>
  <label class="cb-label" id="fl-legume">
    <input type="checkbox" id="cb-legume"> 🫘 Legumes
  </label>
  <label class="cb-label" id="fl-alcohol">
    <input type="checkbox" id="cb-alcohol"> 🍷 Alcohol
  </label>
</div>

<div class="main">
  <aside class="sidebar">
    <div id="sidebar-inner">
      <div class="empty-msg">
        <span class="empty-icon">🔍</span>
        Search above to explore flavour pairings
      </div>
    </div>
  </aside>
  <div class="results-panel" id="results-panel">
    <div class="empty-msg">
      <span class="empty-icon">✨</span>
      Select an ingredient to see what pairs with it
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
(function () {
  // ── Guard: data.js must be loaded ──────────────────────────────────────────
  if (!window.FS) {
    document.getElementById('sidebar-inner').innerHTML = `
      <div class="setup-warn">
        <strong>Setup needed</strong><br><br>
        Run once in the data folder:<br>
        <code>node build.js</code><br><br>
        Then reload this page.
      </div>`;
    document.getElementById('results-panel').innerHTML = '';
    console.error('data.js not loaded or window.FS is undefined');
    return;
  }

  console.log('Flavourspace loaded. Ingredients:', window.FS.ingredients.length,
    '| Match sets:', Object.keys(window.FS.matches).length);

  // ── Data ───────────────────────────────────────────────────────────────────
  const ingredients  = window.FS.ingredients;
  const rawMatches   = window.FS.matches;
  const ingMap       = new Map(ingredients.map(i => [i.id, i]));

  // ── State ──────────────────────────────────────────────────────────────────
  let current      = null;
  let visibleCount = 200;
  const PAGE       = 200;

  // ── Filters ────────────────────────────────────────────────────────────────
  const cbMeat   = document.getElementById('cb-meat');
  const cbAnimal = document.getElementById('cb-animal');
  const cbLegume = document.getElementById('cb-legume');
  const cbAlcohol= document.getElementById('cb-alcohol');

  [cbMeat, cbAnimal, cbLegume, cbAlcohol].forEach(cb => {
    cb.addEventListener('change', () => {
      // Toggle .checked class on the parent label for styling
      cb.closest('.cb-label').classList.toggle('checked', cb.checked);
      visibleCount = PAGE;
      if (current) { renderSidebar(); renderResults(); }
    });
  });

  function filters() {
    return {
      noMeat:   cbMeat.checked,
      noAnimal: cbAnimal.checked,
      noLegume: cbLegume.checked,
      noAlcohol:cbAlcohol.checked,
    };
  }

  // ── Search / autocomplete ──────────────────────────────────────────────────
  const searchEl = document.getElementById('search');
  const dropdown = document.getElementById('dropdown');
  let ddItems = [], ddActive = -1, debounce;

  searchEl.addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(updateDd, 100);
  });

  searchEl.addEventListener('keydown', e => {
    if (!dropdown.classList.contains('open')) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); moveDd(1); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); moveDd(-1); }
    else if (e.key === 'Enter') { e.preventDefault(); if (ddActive >= 0) pickDd(ddActive); }
    else if (e.key === 'Escape') closeDd();
  });

  document.addEventListener('mousedown', e => {
    if (!e.target.closest('.search-wrap')) closeDd();
  });

  function updateDd() {
    const q = searchEl.value.trim().toLowerCase();
    if (!q) { closeDd(); return; }

    const hits = ingredients
      .filter(i => i.name.toLowerCase().includes(q))
      .sort((a, b) => {
        const an = a.name.toLowerCase(), bn = b.name.toLowerCase();
        return (an.startsWith(q) ? 0 : 1) - (bn.startsWith(q) ? 0 : 1) || an.localeCompare(bn);
      })
      .slice(0, 50);

    if (!hits.length) { closeDd(); return; }

    ddItems  = hits;
    ddActive = -1;

    dropdown.innerHTML = hits.map((ing, i) => {
      return `<div class="dd-item" data-i="${i}">
        <span class="dd-name">${hilite(ing.name.trim(), q)}</span>
        <span class="dd-chips">${chips(ing, true)}</span>
      </div>`;
    }).join('');

    dropdown.querySelectorAll('.dd-item').forEach(el =>
      el.addEventListener('mousedown', ev => { ev.preventDefault(); pickDd(+el.dataset.i); })
    );

    dropdown.classList.add('open');
  }

  function moveDd(d) {
    ddActive = Math.max(-1, Math.min(ddItems.length - 1, ddActive + d));
    dropdown.querySelectorAll('.dd-item').forEach((el, i) => {
      el.classList.toggle('active', i === ddActive);
      if (i === ddActive) el.scrollIntoView({ block: 'nearest' });
    });
  }

  function pickDd(i) {
    const ing = ddItems[i];
    searchEl.value = ing.name.trim();
    closeDd();
    selectIng(ing);
  }

  function closeDd() {
    dropdown.classList.remove('open');
    ddItems = []; ddActive = -1;
  }

  function hilite(name, q) {
    const i = name.toLowerCase().indexOf(q);
    if (i < 0) return esc(name);
    return esc(name.slice(0, i))
      + '<strong>' + esc(name.slice(i, i + q.length)) + '</strong>'
      + esc(name.slice(i + q.length));
  }

  // ── Select an ingredient ───────────────────────────────────────────────────
  function selectIng(ing) {
    console.log('Selected:', ing.id, ing.name.trim());
    current      = ing;
    visibleCount = PAGE;
    renderSidebar();
    renderResults();
  }

  // ── Sidebar ────────────────────────────────────────────────────────────────
  function renderSidebar() {
    const filtered = applyFilters();
    const all      = rawMatches[current.id] || [];

    document.getElementById('sidebar-inner').innerHTML =
      '<div class="ing-card">'
      + '<div class="ing-name">' + esc(current.name.trim()) + '</div>'
      + '<div class="chips">' + chips(current, false) + '</div>'
      + '</div>'
      + '<div class="stats">'
      + all.length + ' pairings<br>'
      + filtered.length + ' shown after filters'
      + '</div>';
  }

  // ── Results ────────────────────────────────────────────────────────────────
  function applyFilters() {
    const f   = filters();
    const all = rawMatches[current.id] || [];

    console.log('Filtering', all.length, 'matches for', current.id, current.name.trim());

    return all.filter(m => {
      const [id] = m;
      const ing = ingMap.get(id);
      if (!ing) return true;
      if (f.noMeat   && ing.meat)    return false;
      if (f.noAnimal && ing.animal)  return false;
      if (f.noLegume && ing.legume)  return false;
      if (f.noAlcohol&& ing.alcohol) return false;
      return true;
    });
  }

  function renderResults() {
    const panel    = document.getElementById('results-panel');
    const filtered = applyFilters();
    const slice    = filtered.slice(0, visibleCount);
    const left     = filtered.length - slice.length;

    console.log('Rendering', filtered.length, 'filtered matches, showing', slice.length);

    if (!filtered.length) {
      panel.innerHTML = '<div class="empty-msg"><span class="empty-icon">🫙</span>'
        + 'No pairings match the current filters</div>';
      return;
    }

    let html = '<div class="results-heading">'
      + filtered.length + ' pairing' + (filtered.length !== 1 ? 's' : '')
      + ' for <strong>' + esc(current.name.trim()) + '</strong>'
      + '</div>'
      + '<div class="match-list">';

    for (let i = 0; i < slice.length; i++) {
      html += matchRowHtml(slice[i]);
    }

    html += '</div>';

    if (left > 0) {
      html += '<button class="show-more-btn" id="show-more-btn">'
        + 'Show ' + Math.min(left, PAGE) + ' more (' + left + ' remaining)'
        + '</button>';
    }

    panel.innerHTML = html;

    // Click match → navigate
    panel.querySelectorAll('.match-row').forEach(el =>
      el.addEventListener('click', () => {
        const ing = ingMap.get(el.dataset.id);
        if (!ing) return;
        searchEl.value = ing.name.trim();
        panel.scrollTo(0, 0);
        selectIng(ing);
      })
    );

    const smBtn = document.getElementById('show-more-btn');
    if (smBtn) smBtn.addEventListener('click', () => { visibleCount += PAGE; renderResults(); });
  }

  function matchRowHtml(m) {
    const [id, score] = m;
    const ing  = ingMap.get(id);
    const name = ing ? ing.name.trim() : id;
    const col  = score >= 70 ? '#4ade80' : score >= 40 ? '#facc15' : '#fb923c';

    return '<div class="match-row" data-id="' + esc(id) + '">'
      + '<div class="score-wrap">'
      + '<span class="score-num" style="color:' + col + '">' + score + '</span>'
      + '<div class="score-track"><div class="score-bar" style="width:' + score + '%;background:' + col + '"></div></div>'
      + '</div>'
      + '<div class="match-body">'
      + '<div class="match-name">' + esc(name) + '</div>'
      + '</div>'
      + '<div class="match-chips">' + (ing ? chips(ing, true) : '') + '</div>'
      + '</div>';
  }

  // ── Diet chips ─────────────────────────────────────────────────────────────
  function chips(ing, small) {
    const t = [];
    if      (ing.meat)   t.push(['meat',   '🥩', 'Meat']);
    else if (ing.animal) t.push(['animal', '🐾', 'Animal product']);
    else                 t.push(['vegan',  '🌱', 'Vegan']);
    if (ing.legume)      t.push(['legume', '🫘', 'Legume']);
    if (ing.alcohol)     t.push(['alcohol','🍷', 'Alcohol']);
    if (small) return t.map(([c, e]) => '<span class="chip chip-' + c + '" title="' + c + '">' + e + '</span>').join('');
    return t.map(([c, e, l]) => '<span class="chip chip-' + c + '">' + e + ' ' + l + '</span>').join('');
  }

  // ── Utils ──────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

})();
</script>
</body>
</html>
